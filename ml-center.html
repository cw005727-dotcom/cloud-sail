                    <p><strong>你不需要找到所有人都能爆的品，你只需要找到属于你的那一小群人，然后把他们服务好。</strong></p>

                    <h4>认知六：流量是平台的，用户才是自己的</h4>
                    <p><strong>任何时候，都要把"留量"放在和"流量"同等重要的位置。</strong></p>
                    <p>怎么沉淀？<br>• <strong>独立站</strong>：包裹里放引导卡片，到独立站注册，给折扣码<br>• <strong>邮件列表</strong>：收集用户邮箱，新品上线时告诉老用户<br>• <strong>社交媒体</strong>：用优质内容吸引用户关注<br>• <strong>品牌官网</strong>：让用户知道"你是谁""怎么找到你"</p>

                    <h3>下篇：关于成长与底线的认知</h3>
                    <h4>认知七：合规不是束缚，而是最低成本的生存策略</h4>
                    <p>把<strong>合规当成底线，而不是天花板</strong>。</p>
                    <p>违规的成本比你想象的高：一个平台的黑历史可能会影响你在其他平台的入驻，更可怕的是，有些违规会关联到你的法人身份、你的收款账户、你的品牌备案。</p>
                    <p>当大家都在玩灰色玩法的时候，合规的卖家可能跑得慢。但当平台开始清洗，<strong>合规的卖家就是唯一的幸存者</strong>。</p>

                    <h4>认知八：钱是赚不完的，但可以亏完——守住底线比追求上限更重要</h4>
                    <p><strong>永远把风险控制放在收益预期之前。守住底线，比追求上限更重要。</strong></p>
                    <p>怎么守住底线？<br>• <strong>资金上</strong>：只用闲钱做，永远不要All in<br>• <strong>心态上</strong>：接受慢一点，接受小富即安<br>• <strong>布局上</strong>：多平台、多账号、多品类分散风险<br>• <strong>退路上</strong>：想清楚最坏的情况是什么，自己能不能接受</p>

// ⚙️ 渲染引擎（不需要改）
// ════════════════════════════════════════════════════════════

let currentTab = 'pre';

function render() {
    const app = document.getElementById('app');
    let html = '';

    // 横幅
    html += `
    <div class="hero-banner">
        <img src="${HERO.image}" alt="${HERO.title}">
        <div class="hero-overlay">
            <h1>${HERO.title}</h1>
            <p>${HERO.subtitle}</p>
            <div class="site-tags">
                ${HERO.sites.map(s => `<span class="site-tag">${s}</span>`).join('')}
            </div>
        </div>
    </div>`;

    // 三大板块
    html += `<div class="section-title">📖 课程安排</div><div class="板块-grid">`;
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `
        <div class="板块-card ${isActive ? 'active' : ''}" onclick="switchTab('${sec.tab}')">
            <img src="${sec.image}" alt="${sec.name}">
            <div class="板块-card-body">
                <div class="板块-name">${sec.name}</div>
                <div class="板块-desc">${sec.desc}</div>
            </div>
        </div>`;
    });
    html += `</div>`;

    // 各板块内容
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="course-content ${isActive ? 'active' : ''}" id="tab-${sec.tab}">`;
        if (sec.comingSoon) {
            html += `
            <div class="course-card" style="background:#F0F4FF;border:1px solid #E0E8FF">
                <h3>📈 ${sec.name} - 店铺运营</h3>
                <p>${sec.comingSoonContent}</p>
                <span class="badge-new">即将上线</span>
            </div>`;
        } else {
            sec.articles.forEach(art => {
                html += `
                <div class="course-card" onclick="toggleArticle('${art.id}')">
                    <h3>${art.icon} ${art.title}</h3>
                    <p>${art.summary}</p>
                </div>
                <div class="article-detail" id="art-${art.id}">
                    <div class="article-box">
                        <div class="back-btn" onclick="toggleArticle('${art.id}')">← 返回课程列表</div>
                        ${art.content}
                    </div>
                </div>`;
            });
        }
        html += `</div>`;
    });

    app.innerHTML = html;
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.article-detail').forEach(e => e.classList.remove('active'));
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleArticle(id) {
    const el = document.getElementById('art-' + id);
    if (!el) return;
    const isActive = el.classList.contains('active');
    document.querySelectorAll('.article-detail').forEach(e => e.classList.remove('active'));
    if (!isActive) {
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

render();
</script>
