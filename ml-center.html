    let html = '';

    // 横幅
    html += `<div class="hero-banner"><img src="${HERO.image}" alt="${HERO.title}"><div class="hero-overlay"><h1>${HERO.title}</h1><p>${HERO.subtitle}</p><div class="site-tags">${HERO.sites.map(s => `<span class="site-tag">${s}</span>`).join('')}</div></div></div>`;

    // 三大板块
    html += `<div class="section-title">📖 课程安排</div><div class="板块-grid">`;
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="板块-card ${isActive ? 'active' : ''}" onclick="switchTab('${sec.tab}')"><img src="${sec.image}" alt="${sec.name}"><div class="板块-card-body"><div class="板块-name">${sec.name}</div><div class="板块-desc">${sec.desc}</div></div></div>`;
    });
    html += `</div>`;

    // 各板块内容
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="course-content ${isActive ? 'active' : ''}" id="tab-${sec.tab}">`;
        if (sec.comingSoon) {
            html += `<div class="course-card" style="background:#F0F4FF;border:1px solid #E0E8FF"><h3>📈 ${sec.name} - 店铺运营</h3><p>${sec.comingSoonContent}</p><span class="badge-new">即将上线</span></div>`;
        } else {
            sec.articles.forEach(art => {
                html += `<div class="course-card" onclick="toggleArticle('${art.id}')"><h3>${art.icon} ${art.title}</h3><p>${art.summary}</p></div><div class="article-detail" id="art-${art.id}"><div class="article-box"><div class="back-btn" onclick="toggleArticle('${art.id}')">← 返回课程列表</div>${art.content}</div></div>`;
            });
        }
        html += `</div>`;
    });

    app.innerHTML = html;
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.article-detail').forEach(e => e.classList.remove('active'));
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleArticle(id) {
    const el = document.getElementById('art-' + id);
    if (!el) return;
    const isActive = el.classList.contains('active');
    document.querySelectorAll('.article-detail').forEach(e => e.classList.remove('active'));
    if (!isActive) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
}

render();
</script>

</body>
</html>
