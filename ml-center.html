<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美客多运营中心 - 云帆跨境</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F8FC;
            --card: #FFFFFF;
            --navy: #0B0F35;
            --gold: #F5C518;
            --gold-light: #FFF3CC;
            --text-primary: #1A1D2E;
            --text-secondary: #5B6182;
            --text-muted: #9398B2;
            --border: #E8EAF2;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 1px 3px rgba(11,15,53,0.06);
            --shadow-md: 0 4px 16px rgba(11,15,53,0.08);
            --shadow-lg: 0 12px 40px rgba(11,15,53,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .header a:hover { color: rgba(255,255,255,0.9); }
        .header span { color: rgba(255,255,255,0.25); font-size: 13px; }
        .header h1 { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

        /* ── Layout ── */
        .container { max-width: 1080px; margin: 0 auto; padding: 36px 24px 80px; }

        /* ── Hero ── */
        .hero {
            background: var(--card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
        }
        .hero-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        .hero-img-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: linear-gradient(135deg, rgba(11,15,53,0.65) 0%, rgba(11,15,53,0.3) 100%);
        }
        .hero-body {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 32px 40px;
        }
        .hero-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .hero-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
            font-weight: 400;
        }
        .site-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .site-tag {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 13px;
            color: #fff;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        /* ── Section Title ── */
        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        /* ── Tab Cards ── */
        .tab-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        .tab-card {
            background: var(--card);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            border: 2px solid transparent;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .tab-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .tab-card.active {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(245,197,24,0.12), var(--shadow-md);
        }
        .tab-card-img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .tab-card-body { padding: 18px 20px 20px; }
        .tab-card-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .tab-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        /* ── Course Cards ── */
        .course-list { display: flex; flex-direction: column; gap: 12px; }

        .course-card {
            background: var(--card);
            border-radius: var(--radius-md);
            padding: 22px 28px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid transparent;
        }
        .course-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border);
            transform: translateY(-1px);
        }
        .course-card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .course-card-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        /* ── Article ── */
        .article-wrap { display: none; }
        .article-wrap.active { display: block; animation: fadeUp 0.3s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-box {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 48px 56px;
            box-shadow: var(--shadow-md);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 28px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-primary); }

        /* ── Article Typography ── */
        .article-box h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            line-height: 1.4;
        }
        .article-box h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 32px 0 14px;
            padding-left: 14px;
            border-left: 3px solid var(--gold);
            line-height: 1.5;
        }
        .article-box h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 10px;
            line-height: 1.5;
        }
        .article-box p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.85;
            margin-bottom: 14px;
        }
        .article-box ul {
            padding-left: 20px;
            margin-bottom: 18px;
        }
        .article-box ul li {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.85;
            margin-bottom: 6px;
        }
        .article-box strong { color: var(--text-primary); font-weight: 600; }

        /* ── Highlight / Tip ── */
        .highlight {
            background: linear-gradient(135deg, #FFFBF0 0%, #FFF8E1 100%);
            border-left: 4px solid var(--gold);
            padding: 18px 24px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.8;
        }
        .tip-box {
            background: #F0F4FF;
            border: 1px solid #DDE3F9;
            border-radius: 12px;
            padding: 18px 24px;
            margin: 20px 0;
            font-size: 15px;
            color: #3B407E;
            line-height: 1.8;
        }

        .badge-new {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B6B, #EE5A5A);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 10px;
            letter-spacing: 0.02em;
        }
        .badge-soon {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 10px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .container { padding: 24px 16px 60px; }
            .header { padding: 0 20px; }
            .tab-cards { grid-template-columns: 1fr; gap: 12px; }
            .hero-img { height: 220px; }
            .hero-img-overlay { height: 220px; }
            .hero-body { padding: 24px; }
            .hero-title { font-size: 20px; }
            .article-box { padding: 28px 24px; }
            .article-box h2 { font-size: 20px; }
        }
    </style>
</head>

<p>订单投诉率</p>

<p>CTR（点击率）：计算公式为“点击量÷曝光量×100%”，反映广告的吸引力，点击率越高，说明广告内容越贴合买家需求，有助于提升广告排名。</p>

<p>Mercado Envíos：美客多官方物流服务，按商品重量和配送距离计费，墨西哥站费率约5%-8%，巴西站约5%-9%，是美客多卖家常用的物流渠道。</p>
<p>清关（Customs Clearance）：商品从中国运至美客多目的国（如墨西哥、巴西）时，通过当地海关检查的流程，清关失败会导致货物滞留，新手需提前准备合规资料。</p>
<p>四、库存与成本术语（利润核算必备）</p>
<p>SKU：商品的专属“身份证”，每个独一无二的商品（如红色M码T恤、黑色L码T恤）对应一个SKU，是上架、库存管理、利润核算的核心标识，新手编码建议包含品类、属性等信息，方便管理。</p>
<p>安全库存（Safety Stock）：为应对市场波动、物流延迟等情况，提前储备的库存，避免出现缺货断货，新手可根据商品销量和物流时效合理设置。</p>
<p>滞销库存（Dead Stock）：长期未售出的库存，会占用资金和仓储成本，新手需定期清理，可通过促销、降价等方式处理，避免积压。</p>
<p>平台佣金：美客多按商品类目和刊登类型收取的费用，墨西哥站约12%-18%，巴西站约10%-16%，电子类偏高，商品成交后从销售额中扣除。</p>
<p>综合费率：美客多卖家的核心成本，包括平台佣金、物流费、汇率损耗（2%-3%）、提现手续费（1%-1.5%），合计约20%-30%，新手定价时需将其计入成本，避免亏损。</p>
<p>净利率：核心盈利指标，计算公式为“净利润=售价-采购成本-头程物流-平台佣金-本地物流-汇率损耗-提现手续费-广告费-退货损耗”，建议目标净利率不低于15%。</p>
<p>五、跨境电商通用基础术语（新手入门）</p>
<p>Listing：商品的线上展示页面，相当于“线上店铺门面”，包含标题、主图/副图、详情描述、价格、库存等信息，优化Listing能提升搜索排名和转化率，是新手上架的核心工作。</p>
<p>ERP：跨境运营管理软件，可整合库存、订单、发货、财务等功能，多店铺、多平台运营时能节省人工成本，新手可选择适配中小卖家的基础版。</p>
<p>铺货：新手初期常用的运营方式，批量上传大量商品，靠数量抢占流量，不做精细化运营，适合试错、摸清市场需求，但需注意合规，避免侵权。</p>
<p>精品：长期运营思路，聚焦1-2个核心品类、少数几款商品，从Listing优化、推广到售后全链路精细化运营，利润空间高于铺货模式，适合有一定基础的卖家。</p>
<p>客单价：平均每个买家每次购买的金额，计算公式为“总销售额÷总订单数”，美客多拉美市场理想客单价为25-50美元，是制定定价和促销策略的关键。</p>
<p>转化率：浏览商品的买家最终下单的比例，美客多健康转化率为3%-5%，低于2%说明商品吸引力不足，需优化Listing或价格。</p>
<p>退款率：退款订单占总订单的比例，平台对退款率超过10%的店铺会限制流量，服装类目警戒线为8%，电子类目为5%，新手需严控商品质量和描述一致性。</p>
<p>六、新手补充提示</p>
<ol>
<li> 美客多各站点费率（佣金、物流费）可能调整，建议每季度在卖家后台“Tarifas”页面查询最新数据；</li>
</ol>
<ol>
<li> 新手优先选择自发货模式试错，积累经验后再布局海外仓，降低库存和资金压力；</li>
</ol>
<ol>
<li> 核心指标（ACOS、转化率、退款率、店铺声誉）需每日关注，及时调整运营策略，避免违规；</li>
</ol>
<ol>
<li> 避免盲目跟风爆款，结合自身供应链优势选品，同时做好合规检查，杜绝侵权、禁售商品。</li>
</ol>\`

        name: '售后板块', desc: '退换货处理、声誉挽回等订单相关事宜，守护店铺口碑',
        comingSoon: true
    }
];

let currentTab = 'pre';

function render() {
    const app = document.getElementById('app');
    let html = '';

    // Hero
    html += `<div class="hero">
        <div class="hero-img-overlay"></div>
        <img class="hero-img" src="${HERO.image}" alt="${HERO.title}">
        <div class="hero-body">
            <div class="hero-title">${HERO.title}</div>
            <div class="hero-sub">${HERO.subtitle}</div>
            <div class="site-tags">${HERO.sites.map(s => `<span class="site-tag">${s}</span>`).join('')}</div>
        </div>
    </div>`;

    // Section label
    html += `<div class="section-label">课程板块</div>`;

    // Tab cards
    html += `<div class="tab-cards">`;
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="tab-card ${isActive ? 'active' : ''}" onclick="switchTab('${sec.tab}')">
            <img class="tab-card-img" src="${sec.image}" alt="${sec.name}">
            <div class="tab-card-body">
                <div class="tab-card-name">${sec.name}</div>
                <div class="tab-card-desc">${sec.desc}</div>
            </div>
        </div>`;
    });
    html += `</div>`;

    // Content
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="course-list" id="tab-${sec.tab}" style="display:${isActive ? 'flex' : 'none'};flex-direction:column;gap:12px">`;
        if (sec.comingSoon) {
            html += `<div class="course-card" style="background:var(--bg);border:1.5px solid var(--border)">
                <div class="course-card-title">📈 ${sec.name} <span class="badge-soon">即将上线</span></div>
                <div class="course-card-summary">${sec.desc} · 课程内容持续更新中</div>
            </div>`;
        } else {
            sec.articles.forEach(art => {
                html += `<div class="course-card" onclick="toggleArticle('${art.id}')">
                    <div class="course-card-title">${art.icon} ${art.title}</div>
                    <div class="course-card-summary">${art.summary}</div>
                </div>
                <div class="article-wrap" id="art-${art.id}">
                    <div class="article-box">
                        <div class="back-btn" onclick="toggleArticle('${art.id}')">← 返回课程列表</div>
                        ${art.content}
                    </div>
                </div>`;
            });
        }
        html += `</div>`;
    });

    app.innerHTML = html;
}

function switchTab(tab) {
    currentTab = tab;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleArticle(id) {
    const el = document.getElementById('art-' + id);
    if (!el) return;
    const isActive = el.classList.contains('active');
    document.querySelectorAll('.article-wrap').forEach(e => e.classList.remove('active'));
    if (!isActive) {
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

render();
</script>
</body>
