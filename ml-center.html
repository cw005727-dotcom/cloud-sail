<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美客多运营中心-v2 - 云帆跨境</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F8FC;
            --card: #FFFFFF;
            --navy: #0B0F35;
            --gold: #F5C518;
            --gold-light: #FFF3CC;
            --text-primary: #1A1D2E;
            --text-secondary: #5B6182;
            --text-muted: #9398B2;
            --border: #E8EAF2;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-sm: 0 1px 3px rgba(11,15,53,0.06);
            --shadow-md: 0 4px 16px rgba(11,15,53,0.08);
            --shadow-lg: 0 12px 40px rgba(11,15,53,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .header a:hover { color: rgba(255,255,255,0.9); }
        .header span { color: rgba(255,255,255,0.25); font-size: 13px; }
        .header h1 { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }

        /* ── Layout ── */
        .container { max-width: 1080px; margin: 0 auto; padding: 36px 24px 80px; }

        /* ── Hero ── */
        .hero {
            background: var(--card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            position: relative;
        }
        .hero-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        .hero-img-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: linear-gradient(135deg, rgba(11,15,53,0.65) 0%, rgba(11,15,53,0.3) 100%);
        }
        .hero-body {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 32px 40px;
        }
        .hero-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .hero-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
            font-weight: 400;
        }
        .site-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .site-tag {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 13px;
            color: #fff;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        /* ── Section Title ── */
        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        /* ── Tab Cards ── */
        .tab-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        .tab-card {
            background: var(--card);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            border: 2px solid transparent;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .tab-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .tab-card.active {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(245,197,24,0.12), var(--shadow-md);
        }
        .tab-card-img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .tab-card-body { padding: 18px 20px 20px; }
        .tab-card-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .tab-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        /* ── Course Cards ── */
        .course-list { display: flex; flex-direction: column; gap: 12px; }

        .course-card {
            background: var(--card);
            border-radius: var(--radius-md);
            padding: 22px 28px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid transparent;
        }
        .course-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border);
            transform: translateY(-1px);
        }
        .course-card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .course-card-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        /* ── Article ── */
        .article-wrap { display: none; }
        .article-wrap.active { display: block; animation: fadeUp 0.3s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-box {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 48px 56px;
            box-shadow: var(--shadow-md);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 28px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-primary); }

        /* ── Article Typography ── */
        .article-box h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            line-height: 1.4;
        }
        .article-box h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 32px 0 14px;
            padding-left: 14px;
            border-left: 3px solid var(--gold);
            line-height: 1.5;
        }
        .article-box h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 10px;
            line-height: 1.5;
        }
        .article-box p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.85;
            margin-bottom: 14px;
        }
        .article-box ul {
            padding-left: 20px;
            margin-bottom: 18px;
        }
        .article-box ul li {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.85;
            margin-bottom: 6px;
        }
        .article-box strong { color: var(--text-primary); font-weight: 600; }

        /* ── Highlight / Tip ── */
        .highlight {
            background: linear-gradient(135deg, #FFFBF0 0%, #FFF8E1 100%);
            border-left: 4px solid var(--gold);
            padding: 18px 24px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.8;
        }
        .tip-box {
            background: #F0F4FF;
            border: 1px solid #DDE3F9;
            border-radius: 12px;
            padding: 18px 24px;
            margin: 20px 0;
            font-size: 15px;
            color: #3B407E;
            line-height: 1.8;
        }

        .badge-new {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B6B, #EE5A5A);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 10px;
            letter-spacing: 0.02em;
        }
        .badge-soon {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 10px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .container { padding: 24px 16px 60px; }
            .header { padding: 0 20px; }
            .tab-cards { grid-template-columns: 1fr; gap: 12px; }
            .hero-img { height: 220px; }
            .hero-img-overlay { height: 220px; }
            .hero-body { padding: 24px; }
            .hero-title { font-size: 20px; }
            .article-box { padding: 28px 24px; }
            .article-box h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html">← 工作台</a>
    <span>/</span>
    <h1 id="pageTitle">📚 美客多运营中心-v2</h1>
</div>

<div class="container" id="app">
    <div id="loading-state" style="padding:80px 40px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">🦞</div>
        <div style="color:#9398B2;font-size:15px">页面加载中...</div>
        <div id="load-error" style="display:none;margin-top:20px;padding:20px;background:#FEF2F2;border-radius:12px;color:#DC2626;font-size:14px">
            数据加载失败，请检查网络后 <button onclick="location.reload()" style="background:#0B0F35;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;margin-left:8px">刷新重试</button>
        </div>
    </div>
</div>

<script>
let SITE_CONFIG = null;
let SECTIONS = [];
let currentTab = 'pre';

async function loadSiteConfig() {
    try {
        const res = await fetch('/api/courses');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        SITE_CONFIG = data.siteConfig || {
            heroImage: 'assets/images/ml-cover-v2---053e4bb1-60bf-4602-8ffe-1458e527fb6b.png',
            heroTitle: '🚀 美客多出单宝典（2026年第三版）',
            heroSubtitle: '三年实战经验沉淀，售前 · 售中 · 售后全链路指南',
            sites: ['🇲🇽 墨西哥', '🇨🇱 智利', '🇧🇷 巴西', '🇨🇴 哥伦比亚', '🇦🇷 阿根廷'],
            pageTitle: '美客多运营中心-v2'
        };
        SECTIONS = data.sections || [];
        document.getElementById('load-error').style.display = 'none';
        // Update header title
        document.getElementById('pageTitle').textContent = '📚 ' + (SITE_CONFIG.pageTitle || '美客多运营中心-v2');
        // Show content
        document.getElementById('loading-state').style.display = 'none';
        render();
    } catch (e) {
        console.error('loadSiteConfig error:', e);
        document.getElementById('load-error').style.display = 'block';
    }
}

function switchTab(tab) {
    currentTab = tab;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showArticle(articleId) {
    const articles = SECTIONS.find(s => s.tab === currentTab)?.articles || [];
    const article = articles.find(a => a.id === articleId);
    if (!article) return;
    
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="article-box">
            <div class="back-btn" onclick="switchTab('${currentTab}')">← 返回课程列表</div>
            <div class="article-content">
                ${article.content || '<p>内容加载中...</p>'}
            </div>
        </div>
    `;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
    const app = document.getElementById('app');
    if (SECTIONS.length === 0) return;

    let html = '';

    // Hero
    html += `<div class="hero">
        <div class="hero-img-overlay"></div>
        <img class="hero-img" src="${SITE_CONFIG.heroImage}" alt="${SITE_CONFIG.heroTitle}">
        <div class="hero-body">
            <div class="hero-title">${SITE_CONFIG.heroTitle}</div>
            <div class="hero-sub">${SITE_CONFIG.heroSubtitle}</div>
            <div class="site-tags">${(SITE_CONFIG.sites || []).map(s => `<span class="site-tag">${s}</span>`).join('')}</div>
        </div>
    </div>`;

    // Section label
    html += `<div class="section-label">课程板块</div>`;

    // Tab cards
    html += `<div class="tab-cards">`;
    SECTIONS.forEach(sec => {
        const isActive = currentTab === sec.tab;
        html += `<div class="tab-card ${isActive ? 'active' : ''}" onclick="switchTab('${sec.tab}')">
            <img class="tab-card-img" src="${sec.image}" alt="${sec.name}">
            <div class="tab-card-body">
                <div class="tab-card-name">${sec.name}</div>
                <div class="tab-card-desc">${sec.desc}</div>
            </div>
        </div>`;
    });
    html += `</div>`;

    // Course list
    const currentSection = SECTIONS.find(s => s.tab === currentTab);
    if (currentSection) {
        html += `<div class="section-label" style="margin-top:32px">${currentSection.name} · 课程列表</div>`;
        html += `<div class="course-list">`;
        currentSection.articles.forEach(article => {
            html += `<div class="course-card" onclick="showArticle('${article.id}')">
                <div class="course-card-title">
                    <span>${article.icon || '📄'}</span>
                    <span>${article.title}</span>
                </div>
                <div class="course-card-summary">${article.summary}</div>
            </div>`;
        });
        html += `</div>`;
    }

    app.innerHTML = html;
}

// Init
loadSiteConfig();
</script>
</body>
</html>
