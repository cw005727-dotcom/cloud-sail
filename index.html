<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云帆跨境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0d1025 100%);
            color: #fff;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧品牌区域 */
        .brand-section {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, 3%); }
        }

        .brand-content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .logo {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .brand-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 28px 32px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateX(8px);
        }

        .feature-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }

        .feature-card p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
        }

        /* 右侧登录区域 */
        .login-section {
            width: 480px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
        }

        .login-card {
            width: 100%;
            max-width: 360px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }

        .login-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 16px;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .register-link a {
            color: #a5b4fc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #c4b5fd;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .brand-section {
                padding: 40px 30px;
            }

            .brand-title {
                font-size: 36px;
            }

            .login-section {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧品牌区域 -->
        <div class="brand-section">
            <div class="brand-content">
                <div class="logo">YUNFAN CROSS-BORDER</div>
                <h1 class="brand-title">云帆跨境</h1>
                <p class="brand-subtitle">专注跨境电商的智能工作台。高效采集、智能生成、合规发布，一站式管理你的跨境业务。</p>
                
                <div class="features">
                    <div class="feature-card">
                        <h3>⚡ 快捷</h3>
                        <p>快速采集商品信息，智能生成Listing，一键发布到多平台。</p>
                    </div>
                    <div class="feature-card">
                        <h3>✨ 完善</h3>
                        <p>完整的数据分析，丰富的功能模块，满足跨境电商全链路需求。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧登录区域 -->
        <div class="login-section">
            <div class="login-card">
                <div class="login-header">
                    <h2>欢迎回来</h2>
                    <p>登录后将自动恢复你的访问权限<br>和系统工作区</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>登录邮箱</label>
                        <input type="email" id="email" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>

                    <button type="submit" class="login-btn">进入工作台</button>
                </form>

                <div class="divider"><span>或</span></div>

                <p class="register-link">
                    还没有账号？<a href="register.html">立即注册</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // 演示用，实际需要对接后端
            console.log('登录信息:', { email, password });
            alert('登录功能开发中...');
        });
    </script>
</body>
</html>
