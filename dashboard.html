<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 云帆跨境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f4f5f7;
        }

        /* ==================== 左侧导航 ==================== */
        .sidebar {
            width: 240px;
            background: #0b0f35;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(99,102,241,0.25);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .sidebar-logo-text {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }

        /* 导航菜单 */
        .nav-section {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
        }

        .nav-item.active {
            background: rgba(99,102,241,0.2);
            color: #818cf8;
        }

        .nav-item-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        /* 用户区 */
        .sidebar-user {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .user-info-text {
            flex: 1;
            min-width: 0;
        }

        .user-info-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-info-phone {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        .logout-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }

        .logout-btn:hover { color: #f87171; }

        /* ==================== 右侧主内容 ==================== */
        .main {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
        }

        .topbar {
            background: #fff;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e8e8ee;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .topbar-btn:hover { background: #2d2d4a; }

        .page-content {
            padding: 32px;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .page-desc {
            font-size: 13px;
            color: #aaa;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 22px 24px;
            border: 1px solid #e8e8ee;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1;
        }

        .stat-change {
            font-size: 11px;
            margin-top: 6px;
            color: #10b981;
        }

        /* 功能入口卡片 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .feature-card {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            border: 1px solid #e8e8ee;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .feature-card:hover {
            border-color: #818cf8;
            box-shadow: 0 4px 20px rgba(99,102,241,0.1);
            transform: translateY(-2px);
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .feature-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .feature-card p {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        /* 最近操作记录 */
        .recent-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e8e8ee;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f5;
        }

        .recent-item:last-child { border-bottom: none; }

        .recent-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .recent-info { flex: 1; }
        .recent-info-title { font-size: 13px; font-weight: 500; color: #1a1a2e; }
        .recent-info-time { font-size: 11px; color: #bbb; margin-top: 2px; }

        .recent-status {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .recent-status.success { background: rgba(16,185,129,0.1); color: #10b981; }
        .recent-status.pending { background: rgba(250,204,21,0.1); color: #d97706; }

        /* 响应式 */
        @media (max-width: 1100px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .feature-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-logo-text, .nav-label, .nav-item span, .user-info-text, .logout-btn { display: none; }
            .main { margin-left: 60px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .feature-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 左侧导航 -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">⚡</div>
            <span class="sidebar-logo-text">云帆跨境</span>
        </div>

        <div class="nav-section" id="navList"></div>

        <div class="sidebar-user">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">加载</div>
                <div class="user-info-text">
                    <div class="user-info-name" id="userName">加载中...</div>
                    <div class="user-info-phone" id="userPhone">--</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="退出登录">✕</button>
            </div>
        </div>
    </div>

    <!-- 右侧主内容 -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-title" id="topbarTitle">首页概览</div>
            <div class="topbar-actions">
                <button class="topbar-btn" onclick="showPage('collect')">⚡ 新建采集</button>
            </div>
        </div>

        <div class="page-content" id="pageContent">
            <!-- 首页概览 -->
            <div class="page-header">
                <div class="page-title">欢迎回来，<span id="welcomeName">--</span></div>
                <div class="page-desc">以下是你的工作台概览</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">已采集商品</div>
                    <div class="stat-value">0</div>
                    <div class="stat-change">↑ 0 本月</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已优化图文</div>
                    <div class="stat-value">0</div>
                    <div class="stat-change">↑ 0 本月</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">待发布</div>
                    <div class="stat-value">0</div>
                    <div class="stat-change">暂无队列</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">账号状态</div>
                    <div class="stat-value" style="font-size:16px;padding-top:6px">✅ 正常</div>
                    <div class="stat-change">MercadoLibre</div>
                </div>
            </div>

            <div class="feature-grid">
                <div class="feature-card" onclick="showPage('collect')">
                    <div class="feature-icon" style="background:rgba(250,204,21,0.12)">📦</div>
                    <h3>商品采集</h3>
                    <p>从任意平台采集商品，一键提取主图、变体、SKU、价格等信息</p>
                </div>
                <div class="feature-card" onclick="showPage('ai')">
                    <div class="feature-icon" style="background:rgba(139,92,246,0.12)">✨</div>
                    <h3>AI 图文优化</h3>
                    <p>智能优化商品主图、标题、描述，自动生成符合平台规则的内容</p>
                </div>
                <div class="feature-card" onclick="showPage('publish')">
                    <div class="feature-icon" style="background:rgba(52,211,153,0.12)">🚀</div>
                    <h3>发布管理</h3>
                    <p>批量发布商品到 MercadoLibre，支持草稿预览和定时发布</p>
                </div>
            </div>

            <div class="recent-section">
                <div class="section-title">最近操作</div>
                <div id="recentList">
                    <div style="text-align:center;padding:32px;color:#ccc;font-size:13px">
                        暂无操作记录，开始你的第一个采集任务吧
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

let SITE_CONFIG = null;
async function loadSiteConfig() {
    try {
        const res = await fetch('/api/courses');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        SITE_CONFIG = data.siteConfig || {};
        if (SITE_CONFIG.navItems && SITE_CONFIG.navItems.length) {
            renderNavItems(SITE_CONFIG.navItems);
        }
    } catch (e) {
        console.error('loadSiteConfig error:', e);
    }
}

function renderNavItems(items) {
    const nav = document.getElementById('navList');
    if (!nav) return;
    let html = `<div class="nav-label">工作台</div>
        <a class="nav-item active" href="#" onclick="showPage('overview');return false;">
            <span class="nav-item-icon">🏠</span><span>首页概览</span>
        </a>`;
    if (items && items.length) {
        html += `<div class="nav-label" style="margin-top:16px">功能</div>`;
        items.forEach(item => {
            if (item.type === 'link') {
                html += `<a class="nav-item" href="${item.url}" target="_blank">
                    <span class="nav-item-icon">${item.icon || ''}</span>
                    <span>${item.label}</span>
                </a>`;
            } else {
                html += `<a class="nav-item" href="#" onclick="showPage('${item.id}');return false;">
                    <span class="nav-item-icon">${item.icon || ''}</span>
                    <span>${item.label}</span>
                </a>`;
            }
        });
    }
    nav.innerHTML = html;
}

function updateTitles() {
    if (!SITE_CONFIG || !SITE_CONFIG.pageTitle) return;
    const nav = document.getElementById('nav-ml-center-title');
    if (nav) nav.textContent = SITE_CONFIG.pageTitle;
    const feature = document.getElementById('feature-ml-center-title');
    if (feature) feature.textContent = SITE_CONFIG.pageTitle;
}

        // 检查登录状态
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');

        let valid = false;
        let parsedUser = null;
        if (token && userStr && userStr !== 'undefined' && userStr !== 'null') {
            try {
                parsedUser = JSON.parse(userStr);
                if (parsedUser && parsedUser.id) valid = true;
            } catch(e) {}
        }

        if (!valid) {
            console.log('AUTH FAIL - redirecting to login');
            console.log('token:', token);
            console.log('userStr:', userStr);
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        } else {
            console.log('AUTH OK - rendering dashboard');
            document.getElementById('userName').textContent = parsedUser.name || '用户';
            document.getElementById('welcomeName').textContent = parsedUser.name || '用户';
            document.getElementById('userPhone').textContent = parsedUser.phone || '';
            document.getElementById('userAvatar').textContent = (parsedUser.name || 'U').charAt(0).toUpperCase();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Init page titles after DOM ready
        loadSiteConfig().then(updateTitles);

        function showPage(page) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.closest('.nav-item')?.classList.add('active');

            const titles = {
                overview: '首页概览',
                collect: '商品采集',
                ai: 'AI 图文优化',
                publish: '发布管理',
                analytics: '数据分析',
                account: '账号管理'
            };
            document.getElementById('topbarTitle').textContent = titles[page] || page;

            // 各页面内容（暂时用占位符）
            const pages = {
                overview: `
                    <div class="page-header">
                        <div class="page-title">欢迎回来，<span id="welcomeName2">${(JSON.parse(userStr||'{}')).name||'用户'}</span></div>
                        <div class="page-desc">以下是你的工作台概览</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label">已采集商品</div><div class="stat-value">0</div><div class="stat-change">↑ 0 本月</div></div>
                        <div class="stat-card"><div class="stat-label">已优化图文</div><div class="stat-value">0</div><div class="stat-change">↑ 0 本月</div></div>
                        <div class="stat-card"><div class="stat-label">待发布</div><div class="stat-value">0</div><div class="stat-change">暂无队列</div></div>
                        <div class="stat-card"><div class="stat-label">账号状态</div><div class="stat-value" style="font-size:16px;padding-top:6px">✅ 正常</div><div class="stat-change">MercadoLibre</div></div>
                    </div>
                    <div class="feature-grid">
                        <div class="feature-card" onclick="showPage('collect')"><div class="feature-icon" style="background:rgba(250,204,21,0.12)">📦</div><h3>商品采集</h3><p>从任意平台采集商品，一键提取主图、变体、SKU、价格等信息</p></div>
                        <div class="feature-card" onclick="showPage('ai')"><div class="feature-icon" style="background:rgba(139,92,246,0.12)">✨</div><h3>AI 图文优化</h3><p>智能优化商品主图、标题、描述，自动生成符合平台规则的内容</p></div>
                        <div class="feature-card" onclick="window.open('ml-center.html','_blank')"><div class="feature-icon" style="background:rgba(255,216,64,0.15)">📚</div><h3 id="feature-ml-center-title">美客多运营中心</h3><p>出单宝典课程，售前·售中·售后全链路指南</p></div>
                        <div class="feature-card" onclick="showPage('publish')"><div class="feature-icon" style="background:rgba(52,211,153,0.12)">🚀</div><h3>发布管理</h3><p>批量发布商品到 MercadoLibre，支持草稿预览和定时发布</p></div>
                    </div>
                    <div class="recent-section"><div class="section-title">最近操作</div><div style="text-align:center;padding:32px;color:#ccc;font-size:13px">暂无操作记录</div></div>`,
                collect: `<div class="page-header"><div class="page-title">商品采集</div><div class="page-desc">输入商品链接开始采集</div></div><div class="recent-section"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">📦</div><div>功能开发中，即将上线</div></div></div>`,
                ai: `<div class="page-header"><div class="page-title">AI 图文优化</div><div class="page-desc">选择商品进行 AI 优化</div></div><div class="recent-section"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">✨</div><div>功能开发中，即将上线</div></div></div>`,
                publish: `<div class="page-header"><div class="page-title">发布管理</div><div class="page-desc">管理待发布商品</div></div><div class="recent-section"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">🚀</div><div>功能开发中，即将上线</div></div></div>`,
                analytics: `<div class="page-header"><div class="page-title">数据分析</div><div class="page-desc">查看运营数据</div></div><div class="recent-section"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">📊</div><div>功能开发中，即将上线</div></div></div>`,
                account: `<div class="page-header"><div class="page-title">账号管理</div><div class="page-desc">管理绑定账号和设置</div></div><div class="recent-section"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">⚙️</div><div>功能开发中，即将上线</div></div></div>`
            };

            document.getElementById('pageContent').innerHTML = pages[page] || pages.overview;
        }
    </script>
</body>
</html>
