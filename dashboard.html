<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云帆跨境工作台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }

/* 左侧边栏 */
.sidebar { width: 220px; background: #1e293b; color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.sidebar-logo-icon { font-size: 20px; }
.nav-section { flex: 1; padding: 12px 8px; }
.nav-label { font-size: 11px; color: rgba(255,255,255,0.4); padding: 8px 8px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
.nav-item.active { background: rgba(59,130,246,0.3); color: #93c5fd; }
.nav-item-icon { font-size: 16px; flex-shrink: 0; }
.sidebar-user { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 32px; height: 32px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; }
.user-info-name { font-size: 13px; color: #fff; font-weight: 500; }
.user-info-phone { font-size: 11px; color: rgba(255,255,255,0.5); }
.logout-btn { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 16px; padding: 4px; }
.logout-btn:hover { color: #f87171; }

/* 主内容区 */
.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
.topbar { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
.topbar-title { font-size: 16px; font-weight: 600; color: #111; }
.topbar-sub { font-size: 13px; color: #6b7280; margin-left: 12px; }
.page-content { padding: 24px; flex: 1; }

/* 首页概览 */
.page-title { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
.page-desc { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; }
.stat-label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; color: #111; }
.stat-change { font-size: 12px; color: #6b7280; margin-top: 4px; }
.feature-grid { display: grid; grid-template-columns: repeat(auto, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.feature-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.15s; }
.feature-card:hover { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.feature-icon { font-size: 28px; margin-bottom: 12px; }
.feature-card h3 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 6px; }
.feature-card p { font-size: 13px; color: #6b7280; line-height: 1.5; }
.recent-section { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; }
.section-title { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 16px; }
.placeholder { text-align: center; padding: 48px; color: #d1d5db; font-size: 14px; }
.placeholder-icon { font-size: 40px; margin-bottom: 8px; }

/* 加载状态 */
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 14px; color: #6b7280; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <span class="sidebar-logo-icon">⚡</span>
        <span>云帆跨境</span>
    </div>
    <div class="nav-section" id="navList">
        <div class="nav-label">工作台</div>
        <a class="nav-item active" href="#" id="nav-overview" onclick="switchPage('overview');return false;">
            <span class="nav-item-icon">🏠</span><span>首页概览</span>
        </a>
        <div class="nav-label" style="margin-top:16px" id="nav-features-label" style="display:none">功能</div>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
            <div class="user-info-name" id="userName">加载中...</div>
            <div class="user-info-phone" id="userPhone"></div>
        </div>
        <button class="logout-btn" onclick="logout()" title="退出登录">✕</button>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div>
            <span class="topbar-title" id="topbarTitle">首页概览</span>
        </div>
        <div style="font-size:13px;color:#6b7280" id="topbarSub"></div>
    </div>
    <div class="page-content" id="pageContent"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    正在加载配置...
</div>

<script>
// ========== 全局状态 ==========
var CURRENT_PAGE = 'overview';
var SITE_CONFIG = null;

// ========== 登录检查 ==========
(function() {
    var token = localStorage.getItem('token') || '';
    var userStr = localStorage.getItem('user') || '';
    var isDebug = location.search.indexOf('debug=true') !== -1;

    if (isDebug) {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:460px;margin:0 auto"><h2>🔧 Debug 模式</h2><p>当前 localStorage:</p><pre id="dbg" style="background:#f5f5f5;padding:15px;border-radius:8px"></pre><input id="dbg-name" value="陈三" placeholder="姓名" style="width:100%;padding:10px;margin-top:16px;border:1px solid #ddd;border-radius:6px"><br><input id="dbg-phone" value="13166290991" placeholder="手机号" style="width:100%;padding:10px;margin-top:8px;border:1px solid #ddd;border-radius:6px"><br><button onclick="doDebugLogin()" style="width:100%;padding:12px;margin-top:12px;background:#22c55e;color:#fff;border:none;border-radius:6px;cursor:pointer">登录</button></div>';
        document.getElementById('dbg').textContent = 'token: ' + (token||'(空)') + '\nuser: ' + (userStr||'(空)');
        window.doDebugLogin = function() {
            var n = document.getElementById('dbg-name').value;
            var p = document.getElementById('dbg-phone').value;
            localStorage.setItem('token', 'debug_' + Date.now());
            localStorage.setItem('user', JSON.stringify({id:'u1', name:n, phone:p}));
            location.href = 'dashboard';
        };
        return;
    }

    var user = null;
    if (userStr) { try { user = JSON.parse(userStr); } catch(e) {} }

    if (user && user.id) {
        document.getElementById('userAvatar').textContent = (user.name||'?').charAt(0).toUpperCase();
        document.getElementById('userName').textContent = user.name || '用户';
        document.getElementById('userPhone').textContent = user.phone || '';
    }
})();

// ========== 登出 ==========
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    location.href = 'login.html';
}
window.logout = logout;

// ========== 加载站点配置 ==========
async function loadSiteConfig() {
    try {
        var res = await fetch('/api/courses');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        SITE_CONFIG = data.siteConfig || {};
        renderNavItems(SITE_CONFIG.navItems || []);
        updatePageTitles();
    } catch(e) {
        console.error('加载配置失败:', e);
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

// ========== 渲染导航菜单 ==========
function renderNavItems(items) {
    var navList = document.getElementById('navList');
    var label = document.getElementById('nav-features-label');
    if (!navList) return;

    // 保留顶部的工作台区块，只在后面追加功能菜单
    var baseHTML = '<div class="nav-label">工作台</div>' +
        '<a class="nav-item active" href="#" id="nav-overview" onclick="switchPage(\'overview\');return false;">' +
        '<span class="nav-item-icon">🏠</span><span>首页概览</span></a>';

    var featuresHTML = '';
    if (items && items.length > 0) {
        featuresHTML += '<div class="nav-label" style="margin-top:16px">功能</div>';
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            if (item.type === 'link') {
                featuresHTML += '<a class="nav-item" href="' + item.url + '" target="_blank">' +
                    '<span class="nav-item-icon">' + (item.icon||'') + '</span><span>' + item.label + '</span></a>';
            } else {
                featuresHTML += '<a class="nav-item" href="#" onclick="switchPage(\'' + item.id + '\');return false;">' +
                    '<span class="nav-item-icon">' + (item.icon||'') + '</span><span>' + item.label + '</span></a>';
            }
        }
    }

    navList.innerHTML = baseHTML + featuresHTML;
    if (label) label.style.display = items && items.length > 0 ? '' : 'none';
}

// ========== 更新页面标题 ==========
function updatePageTitles() {
    if (!SITE_CONFIG || !SITE_CONFIG.pageTitle) return;
    var els = ['nav-ml-center-title', 'feature-ml-center-title'];
    for (var i = 0; i < els.length; i++) {
        var el = document.getElementById(els[i]);
        if (el) el.textContent = SITE_CONFIG.pageTitle;
    }
}

// ========== 页面内容 ==========
var PAGES = {
    'ml-center': function() {
        return '<div class="page-title">📚 美客多运营中心</div><div class="page-desc">课程内容请在独立页面查看</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">📚</div><div><a href="ml-center.html" target="_blank" style="color:var(--blue)">点击打开美客多运营中心 →</a></div></div></div>';
    },
    'ml-data': function() {
        return '<div class="page-title">📊 美客多数据中心</div><div class="page-desc">详细数据请在独立页面查看</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">📊</div><div><a href="ml-data.html" target="_blank" style="color:var(--blue)">点击打开美客多数据中心 →</a></div></div></div>';
    },
    'ml-optimize': function() {
        return '<div class="page-title">✨ 美客多优化中心</div><div class="page-desc">优化工具请在独立页面使用</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">✨</div><div><a href="ml-optimize.html" target="_blank" style="color:var(--blue)">点击打开美客多优化中心 →</a></div></div></div>';
    },
    overview: function() {
        return '<div class="page-title">欢迎回来</div>' +
            '<div class="page-desc">以下是你的工作台概览</div>' +
            '<div class="stats-grid">' +
            '<div class="stat-card"><div class="stat-label">已采集商品</div><div class="stat-value">0</div><div class="stat-change">暂无数据</div></div>' +
            '<div class="stat-card"><div class="stat-label">已优化图文</div><div class="stat-value">0</div><div class="stat-change">暂无数据</div></div>' +
            '<div class="stat-card"><div class="stat-label">待发布</div><div class="stat-value">0</div><div class="stat-change">暂无队列</div></div>' +
            '<div class="stat-card"><div class="stat-label">账号状态</div><div class="stat-value" style="font-size:20px">✅ 正常</div><div class="stat-change">MercadoLibre</div></div>' +
            '</div>' +
            '<div class="feature-grid">' +
            '<div class="feature-card" onclick="window.open(\'ml-center.html\',\'_blank\')"><div class="feature-icon">📚</div><h3>美客多运营中心</h3><p>出单宝典课程，售前·售中·售后全链路指南</p></div>' +
            '<div class="feature-card" onclick="window.open(\'ml-data.html\',\'_blank\')"><div class="feature-icon">📊</div><h3>美客多数据中心</h3><p>实时掌握 GMV、订单、访客等核心经营指标</p></div>' +
            '<div class="feature-card" onclick="window.open(\'ml-optimize.html\',\'_blank\')"><div class="feature-icon">✨</div><h3>美客多优化中心</h3><p>AI 标题优化、图片优化，提升点击率和转化率</p></div>' +
            '</div>' +
            '<div class="recent-section"><div class="section-title">最近操作</div><div class="placeholder"><div class="placeholder-icon">📋</div>暂无操作记录</div></div>';
    },
    collect: function() {
        return '<div class="page-title">商品采集</div><div class="page-desc">输入商品链接开始采集</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">📦</div>功能开发中，即将上线</div></div>';
    },
    ai: function() {
        return '<div class="page-title">AI 图文优化</div><div class="page-desc">选择商品进行 AI 优化</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">✨</div>功能开发中，即将上线</div></div>';
    },
    publish: function() {
        return '<div class="page-title">发布管理</div><div class="page-desc">管理待发布商品</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">🚀</div>功能开发中，即将上线</div></div>';
    },
    analytics: function() {
        return '<div class="page-title">数据分析</div><div class="page-desc">查看运营数据</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">📊</div>功能开发中，即将上线</div></div>';
    },
    account: function() {
        return '<div class="page-title">账号管理</div><div class="page-desc">管理绑定账号和设置</div><div class="recent-section"><div class="placeholder"><div class="placeholder-icon">⚙️</div>功能开发中，即将上线</div></div>';
    }
};

var PAGE_TITLES = {
    overview: '首页概览',
    'ml-center': '美客多运营中心',
    'ml-data': '美客多数据中心',
    'ml-optimize': '美客多优化中心',
    collect: '商品采集', ai: 'AI 图文优化',
    publish: '发布管理', analytics: '数据分析', account: '账号管理'
};

// ========== 切换页面 ==========
function switchPage(page) {
    CURRENT_PAGE = page;
    document.getElementById('topbarTitle').textContent = PAGE_TITLES[page] || page;

    // 更新导航高亮
    var navItems = document.querySelectorAll('.nav-item');
    for (var i = 0; i < navItems.length; i++) {
        navItems[i].classList.remove('active');
    }
    var activeNav = document.getElementById('nav-' + page);
    if (activeNav) activeNav.classList.add('active');

    // 渲染页面内容
    var contentFn = PAGES[page];
    var content = contentFn ? contentFn() : PAGES.overview();
    document.getElementById('pageContent').innerHTML = content;

    // 更新ml-center标题
    updatePageTitles();
}
window.switchPage = switchPage;

// ========== 启动 ==========
loadSiteConfig();
</script>
</body>
</html>
